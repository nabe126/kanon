name: L3 Integration Simulation Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-l3:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run L3 Integration Simulation
      run: |
        make test-l3

    - name: Commit and push evidence
      if: always()
      run: |
        if [ -f ai-agent/workspace/l3_evidence.txt ]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-agent/workspace/l3_evidence.txt
          git commit -m "chore: save L3 simulation evidence [skip ci]" || true
          git push
        else
          echo "No evidence file found."
        fi
