services:
  agent:
    build: .
    container_name: ai_agent_core
    ports:
      - "5000:5000"
    volumes:
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    env_file:
      - ./secrets/.env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
    tty: true
    stdin_open: true
    restart: always
