services:
  agent:
    build: .
    container_name: ai_agent_core
    ports:
      - "5000:5000"
    volumes:
      - ./workspace:/workspace
      - ../memory:/workspace/memory
      - ../docs:/workspace/docs
    working_dir: /workspace
    env_file:
      - ./secrets/.env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - KANON_TEST_TRIGGER=${KANON_TEST_TRIGGER}
    tty: true
    stdin_open: true
    restart: always
