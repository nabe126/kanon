services:
  agent:
    build: .
    container_name: ai_agent_core
    ports:
      - "5000:5000"
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace/ai-agent/workspace
    command: ["python3", "src/discord_agent.py"]
    env_file:
      - ./secrets/.env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - KANON_TEST_TRIGGER=${KANON_TEST_TRIGGER}
      - PYTHONPATH=/workspace/ai-agent/workspace
    tty: true
    stdin_open: true
    restart: always

  monitor:
    build:
      context: ..
      dockerfile: controller/Dockerfile.monitor
    container_name: ai_agent_monitor
    environment:
      - KANON_CONTAINER_NAME=ai_agent_core
      - KANON_HEALTHZ_URL=http://agent:5000/healthz
      - KANON_CHECK_INTERVAL=15
      - KANON_MAX_FAILURES=3
      - PYTHONUNBUFFERED=1
    volumes:
      - ./workspace:/ai-agent/workspace
      - ../controller:/controller
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - agent
    restart: always
